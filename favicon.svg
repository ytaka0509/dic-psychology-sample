<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: green rounded square -->
  <rect width="32" height="32" rx="7" fill="#059669"/>

  <!-- Left brain lobe -->
  <path d="M15,9.5
           C 13,8.5 8.5,9.5 7,13
           C 5.5,16.5 6.5,21 9.5,22.5
           C 11.5,23.5 13.5,23.5 15,22.5
           Z"
        fill="white"/>

  <!-- Right brain lobe -->
  <path d="M17,9.5
           C 19,8.5 23.5,9.5 25,13
           C 26.5,16.5 25.5,21 22.5,22.5
           C 20.5,23.5 18.5,23.5 17,22.5
           Z"
        fill="white"/>

  <!-- Brainstem -->
  <rect x="13.5" y="22.5" width="5" height="3.5" rx="1.5" fill="white"/>

  <!-- Gyri wrinkles — left lobe -->
  <path d="M8.5,14.5 Q10,12.8 11.5,14.5" stroke="#059669" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M8,18.5 Q9.5,16.8 11,18.5"   stroke="#059669" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- Gyri wrinkles — right lobe -->
  <path d="M23.5,14.5 Q22,12.8 20.5,14.5" stroke="#059669" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  <path d="M24,18.5 Q22.5,16.8 21,18.5"   stroke="#059669" stroke-width="1.3" fill="none" stroke-linecap="round"/>
</svg>
